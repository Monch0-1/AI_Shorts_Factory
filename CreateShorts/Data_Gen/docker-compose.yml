version: '3.8'

services:
  video-generator:
    build: .
    container_name: shorts_generator
    volumes:
      # Mount the current directory so code changes apply immediately
      - .:/app
      # Ensure output folder persists to host
      - ./output:/app/output
    env_file:
      - .env
    # Keep the container running so you can execute commands manually if needed
    command: tail -f /dev/null