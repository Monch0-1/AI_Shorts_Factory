resources:
  sfx_audio:
    horror:
      - jump_scare
      - reveal
    comedy:
      - punchline
      - laugh
    neutral:
      - transition

themes:
  default:
    name: default
    video:
      paths:
        - "resources/video/4.mp4"
        - "resources/video/5.mp4"
        - "resources/video/6.mp4"
        - "resources/video/7.mp4"
        - "resources/video/8.mp4"
    music:
      path: "resources/audio/2_23_AM.mp3"
      volume: 0.10

    resources:
      funny:
        confused:
          - { name: "what", path: "resources/audio/sfx/what.mp3" }
          - { name: "huh", path: "resources/audio/sfx/huh.mp3" }
      shock:
        reveal:
          - { name: "boom", path: "resources/audio/sfx/boom.mp3" }

    prompting:
      refinement_goal: "The dialogue must maintain a 1:1 question-answer ratio and prioritize humor over technical detail."
      target_quality_rules:
        - "Funny"
        - "Witty"
        - "Use modern lingo"
        - "Engaging"
        - "Relatable"
      best_examples:
        - "Example 1: (Tina uses the 'universal coffee recipe' analogy.)"
        - "Example 2: (Nina's question uses a common, frustrated developer phrase.)"
      system_instruction: |
        You are a highly skilled scriptwriter for short-form social media comedy and tech debates.
        Your primary goal is to write a casual, witty, and engaging dialogue strictly between two characters.
        Nina must pose skeptical, common-sense questions to expose flaws.
        Tina must provide clear, witty, and often funny analogies to explain complex concepts simply.
        The conversation must flow naturally without lecturing the audience.
      script_schema: |
        {
          "type": "array",
          "description": "List of turns in the dialogue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": {
                "type": "string",
                "description": "Nina or Tina"
              },
              "line": {
                "type": "string",
                "description": "The concise line text."
              },
              "topic": {
                "type": "string",
                "description": "The discussed subtopic."
              },
              "highlight": {
                "type": "object",
                "properties": {
                  "type": { "type": "string", "description": "horror, shock, or funny" },
                  "context": { "type": "string", "description": "e.g., jump_scare, reveal" }
                },
                "required": ["type", "context"]
              }
            },
            "required": ["speaker", "line", "topic"]
          }
        }

    voice_settings:
      stability: 0.75
      similarity_boost: 0.90
      speed: 1.00
      style: 0.0
      use_speaker_boost: True
  
  horror:
    name: horror
    video:
      paths:
        - "resources/video/HorrorVid_Drs.mp4"
    music:
      path: "resources/audio/stale.mp3"
      volume: 0.35

    resources:
      horror:
        jump_scare:
          - { name: "scary_hit", path: "resources/audio/sfx/scary_hit_01.mp3" }
          - { name: "ghost_whisper", path: "resources/audio/sfx/ghost_whisper.mp3" }
      shock:
        reveal:
          - { name: "dramatic_boom", path: "resources/audio/sfx/boom.mp3" }

    prompting:
      system_instruction: |
        You are a master of psychological horror and suspense. Your goal is to adapt the user's story into a high-retention script.

        STRATEGY:
        1. Use short, punchy sentences to build anxiety.
        2. Identify "Beats of Terror": moments where a sound effect (SFX) will maximize the impact.

        HIGHLIGHT RULES:
        - Use 'type: horror, context: jump_scare' only at the climax of a revelation or a sudden noise in the story.
        - Use 'type: horror, context: reveal' when the narrator discovers something unsettling but not yet aggressive.
        - Use 'type: shock, context: reveal' for dramatic plot twists.

        CRITICAL: Every highlight must be logically placed *after* the buildup. Never use more than 3 highlights in a 60-second script to avoid cluttering.
      script_schema: |
        {
          "type": "array",
          "description": "List of lines in the first-person monologue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": { "type": "string" },
              "line": { "type": "string" },
              "mood": { "type": "string" },
              "highlight": {
                "type": "object",
                "properties": {
                  "type": { "type": "string", "description": "horror, shock, or funny" },
                  "context": { "type": "string", "description": "e.g., jump_scare, reveal" }
                },
                "required": ["type", "context"]
              }
            },
            "required": ["speaker", "line", "mood"]
          }
        }
    voice_settings:
      stability: 0.90
      similarity_boost: 0.85
      speed: 0.95
      use_speaker_boost: False

  reddit:
    name: reddit
    video:
      paths:
        - "resources/video/reddit_bgv.mp4"
    music:
      path: "resources/audio/reddit_bgm.mp3"
      volume: 0.15
    prompting:
      refinement_goal: "The narrative must build suspense quickly and end with a definitive, satisfying twist."
      best_examples:
        - "Example 1: The opening hook must occur within the first 10 words."
        - "Example 2: The narrative must use visual metaphor keywords like 'cold dread' or 'unsettling silence'."
      system_instruction: |
        You are a master script editor and adapter for short-form social media narratives. Your primary goal is to convert a user-provided story concept into a compelling, first-person monologue designed for high retention.
        The narrative must be reflective, engaging or amusing and build to a clear point of learning, unexpected twist or funny anecdote. The mood must be flexible (e.g., Amused, Vengeful, Thoughtful).
      script_schema: |
        {
          "type": "array",
          "description": "List of lines in the first-person monologue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": {
                "type": "string",
                "description": "The narrator's name (e.g., Anon, Survivor)."
              },
              "line": {
                "type": "string",
                "description": "The concise line of the monologue."
              },
              "mood": {
                "type": "string",
                "description": "The emotional state of the speaker (e.g., Amused, Vengeful, Thoughtful, Shocked)."
              }
            },
            "required": ["speaker", "line", "mood"]
          }
        }
    voice_settings:
      stability: 0.75
      similarity_boost: 0.90
      speed: 1.05
      style: 0.0
      use_speaker_boost: True

  inspirational:
    name: inspirational
    video:
      paths:
        - "resources/video/reddit_bgv.mp4" # Usar un fondo abstracto/motivational
    music:
      path: "resources/audio/inspirational_music.mp3" # Usar una pista de música más épica/motivacional
      volume: 0.18
    prompting:
      refinement_goal: "The narrative must  connect with an audience through shared emotions and relatable stories, while also providing a clear, actionable message and a strong call to action."
      best_examples:
        - "Example 1: Organize the speech with an engaging introduction, a well-developed body, and a powerful conclusion. "
        - "Example 2: The narrative must offer practical insights, strategies, or perspectives that the audience can use to make positive changes"
      system_instruction: |
        You are a highly articulate and authoritative life coach and software entrepreneur. 
        Your primary goal is to adapt the user's core idea into a compelling, motivational monologue designed for personal and professional reflection. 
        The speech must be delivered with clarity, conviction, and a friendly, reflective tone.
      script_schema: |
        {
          "type": "array",
          "description": "List of lines in the motivational monologue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": {
                "type": "string",
                "description": "The speaker's name (e.g., Tina, Expert)."
              },
              "line": {
                "type": "string",
                "description": "The concise line of the monologue."
              },
              "mood": {
                "type": "string",
                "description": "The emotional state (e.g., Reflective, Assertive, Calming, Conclusive)."
              }
            },
            "required": ["speaker", "line", "mood"]
          }
        }
    voice_settings:
      stability: 0.90
      similarity_boost: 0.90
      speed: 0.90
      style: 0.0
      use_speaker_boost: True

  story_formatter:
    name: story_formatter
    video:
      paths:
        - "resources/video/reddit_bgv.mp4" # Fondo neutro y motivacional
    music:
      path: "resources/audio/2_23_AM.mp3" # Música ambiental neutra
      volume: 0.02
    prompting:
      system_instruction: |
        You are a meticulous script editor, your primary task is to adapt the user's raw text into a series of short, serialized video parts.
      script_schema: |
        {
          "type": "array",
          "description": "List of complete video parts. Each part contains a segment of the story.",
          "items": {
            "type": "object",
            "properties": {
              "part_number": {
                "type": "integer",
                "description": "The index of the part (e.g., 1, 2, 3)."
              },
              "story_summary": {
                "type": "string",
                "description": "A brief summary of the content in this part (e.g., 'The discovery of the mystery door' or 'The aftermath of the fight')."
              },
              "script_lines": {
                "type": "array",
                "description": "The segmented script lines for this specific video part.",
                "items": {
                  "type": "object",
                  "properties": {
                    "speaker": {
                      "type": "string",
                      "description": "The consistent narrator's name."
                    },
                    "line": {
                      "type": "string",
                      "description": "The concise line text (max 10 words)."
                    },
                    "mood": {
                      "type": "string",
                      "description": "The emotional tone for the line."
                    }
                  },
                  "required": ["speaker", "line", "mood"]
                }
              }
            },
            "required": ["part_number", "story_summary", "script_lines"]
          }
        }
      refinement_goal: "The output must be a faithful segment-by-segment retelling of the user's input, optimized for subtitle reading speed and clarity, without adding new commentary or opinion."
      best_examples: [ ] # Vacío, ya que la fuente es externa

    voice_settings:
      stability: 0.85 # Tono muy estable para la narración
      similarity_boost: 0.85
      speed: 1.00 # Velocidad normal de lectura
      style: 0.0
      use_speaker_boost: True