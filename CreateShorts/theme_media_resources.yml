                "description": "The concise line of the monologue."
              },
              "mood": {
                "type": "string",
                "description": "The emotional state of the speaker (e.g., Amused, Vengeful, Thoughtful, Shocked)."
              },
              "highlight": {
                "type": "object",
                "properties": {
                  "category": {
                    "type": "string",
                    "description": "SFX category: 'comedy', 'horror', or 'neutral'"
                  },
                  "desired_traits": {
                    "type": "array",
                    "description": "2 to 5 descriptive trait strings (e.g., punchy, light, quick)",
                    "items": { "type": "string" }
                  },
                  "description": {
                    "type": "string",
                    "description": "Natural language prompt for ElevenLabs generation (e.g., 'a punchy light whoosh with a quick snappy tail')"
                  },
                  "placement": {
                    "type": "string",
                    "description": "Trigger at 'start' or 'end' of dialogue segment."
