                  "beat_delay": {
                    "type": "string",
                    "description": "Pause after SFX: 'none' (no pause), 'short' (0.3s), 'long' (0.7s)"
                  },
                  "offset_seconds": {
                    "type": "number",
                    "description": "Shift in seconds. Negative = Overlap, Positive = Delay. Range: -0.5 to 0.5."
                  },
                  "volume_modifier": {
                    "type": "number",
                    "description": "dB adjustment. Negative for subtle, positive for loud."
                  }
                },
                "required": ["category", "desired_traits", "placement"]
              }
            },
            "required": ["speaker", "line", "mood"]
          }
        }
    voice_settings:
      stability: 0.75
      similarity_boost: 0.9
      speed: 1.05
      style: 0.0
      use_speaker_boost: true
  inspirational:
    name: inspirational
    video:
      paths:
      - resources/video/reddit_bgv.mp4
    music:
      path: resources/audio/inspirational_music.mp3
      volume: 0.18
    prompting:
      refinement_goal: The narrative must connect with an audience through shared
        emotions and relatable stories, while also providing a clear, actionable message
        and a strong call to action.
      best_examples:
      - 'Example 1: Organize the speech with an engaging introduction, a well-developed
        body, and a powerful conclusion.'
      - 'Example 2: The narrative must offer practical insights, strategies, or perspectives
        that the audience can use to make positive changes'
      system_instruction: |
        You are a highly articulate and authoritative life coach and software entrepreneur.
        Your primary goal is to adapt the user's core idea into a compelling, motivational
        monologue designed for personal and professional reflection.
        The speech must be delivered with clarity, conviction, and a friendly, reflective tone.
      script_schema: |
        {
          "type": "array",
          "description": "List of lines in the motivational monologue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": {
                "type": "string",
                "description": "The speaker's name (e.g., Tina, Expert)."
              },
              "line": {
                "type": "string",
                "description": "The concise line of the monologue."
              },
              "mood": {
                "type": "string",
                "description": "The emotional state (e.g., Reflective, Assertive, Calming, Conclusive)."
              }
            },
            "required": ["speaker", "line", "mood"]
          }
        }
    voice_settings:
      stability: 0.9
      similarity_boost: 0.9
      speed: 0.9
      style: 0.0
      use_speaker_boost: true
  story_formatter:
    name: story_formatter
    video:
      paths:
      - resources/video/reddit_bgv.mp4
    music:
      path: resources/audio/2_23_AM.mp3
      volume: 0.02
    prompting:
      system_instruction: |
        You are a meticulous script editor. Your primary task is to adapt the user's raw text
        into a series of short, serialized video parts.
      script_schema: |
        {
          "type": "array",
          "description": "List of complete video parts. Each part contains a segment of the story.",
          "items": {
            "type": "object",
            "properties": {
              "part_number": {
                "type": "integer",
                "description": "The index of the part (e.g., 1, 2, 3)."
              },
              "story_summary": {
                "type": "string",
                "description": "A brief summary of the content in this part."
              },
              "script_lines": {
                "type": "array",
                "description": "The segmented script lines for this specific video part.",
                "items": {
                  "type": "object",
                  "properties": {
                    "speaker": {
                      "type": "string",
                      "description": "The consistent narrator's name."
                    },
                    "line": {
                      "type": "string",
                      "description": "The concise line text (max 10 words)."
                    },
                    "mood": {
                      "type": "string",
                      "description": "The emotional tone for the line."
                    }
                  },
                  "required": ["speaker", "line", "mood"]
                }
              }
            },
            "required": ["part_number", "story_summary", "script_lines"]
          }
        }
      refinement_goal: The output must be a faithful segment-by-segment retelling of the
        user's input, optimized for subtitle reading speed and clarity, without adding new
        commentary or opinion.
      best_examples: []
    voice_settings:
      stability: 0.85
      similarity_boost: 0.85
      speed: 1.0
      style: 0.0
      use_speaker_boost: true
