themes:
  default:
    video:
      path: "resources/video/4.mp4"
    music:
      path: "resources/audio/2_23_AM.mp3"
      volume: 0.10
    prompting:
      system_instruction: |
        You are a highly skilled scriptwriter for short-form social media comedy and tech debates.
        Your primary goal is to write a casual, witty, and engaging dialogue strictly between two characters.
        Nina must pose skeptical, common-sense questions to expose flaws.
        Tina must provide clear, witty, and often funny analogies to explain complex concepts simply.
        The conversation must flow naturally without lecturing the audience.
      script_schema: |
        {
          "type": "array",
          "description": "List of turns in the dialogue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": {
                "type": "string",
                "description": "Nina or Tina"
              },
              "line": {
                "type": "string",
                "description": "The concise line text."
              },
              "topic": {
                "type": "string",
                "description": "The discussed subtopic."
              }
            },
            "required": ["speaker", "line", "topic"]
          }
        }
  
  horror:
    video:
      path: "resources/video/horror_background.mp4"
    music:
      path: "resources/audio/horror.mp3"
      volume: 0.15
    prompting:
      system_instruction: |
        You are a horror storyteller creating eerie, suspenseful content.
        Your goal is to build tension through dialogue between two distinct voices.
        Nina represents the voice of reason and skepticism.
        Tina represents the mysterious, knowing voice that reveals disturbing truths.
      script_schema: |
        {
          "type": "array",
          "description": "List of turns in the dialogue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": {
                "type": "string",
                "description": "Nina or Tina"
              },
              "line": {
                "type": "string",
                "description": "The concise line text."
              },
              "topic": {
                "type": "string",
                "description": "The discussed subtopic."
              }
            },
            "required": ["speaker", "line", "topic"]
          }
        }