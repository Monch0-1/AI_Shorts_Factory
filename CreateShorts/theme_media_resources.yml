themes:
  default:
    name: default
    video:
      paths:
      - resources/video/4.mp4
      - resources/video/5.mp4
      - resources/video/6.mp4
      - resources/video/7.mp4
      - resources/video/8.mp4
    music:
      path: resources/audio/2_23_AM.mp3
      volume: 0.1
    prompting:
      refinement_goal: The dialogue must maintain a 1:1 question-answer ratio and
        prioritize humor over technical detail.
      target_quality_rules:
      - Funny
      - Witty
      - Use modern lingo
      - Engaging
      - Relatable
      best_examples:
      - 'Example 1: (Tina uses the ''universal coffee recipe'' analogy.)'
      - 'Example 2: (Nina''s question uses a common, frustrated developer phrase.)'
      system_instruction: |
        You are a highly skilled scriptwriter for short-form social media comedy and tech debates.

        Your primary goal is to write a casual, witty, and engaging dialogue strictly between two characters.

        Nina must pose skeptical, common-sense questions to expose flaws.

        Tina must provide clear, witty, and often funny analogies to explain complex concepts simply.

        The conversation must flow naturally without lecturing the audience.


        **PROFESSIONAL SFX EDITOR MODE:**

        Act as a professional audio editor. Use the 'highlight' object to time SFX for maximum impact:

        1. **category:** Must be one of the available SFX categories (e.g., 'comedy', 'horror', 'neutral').

        2. **desired_traits:** A list of 2 to 5 descriptive strings for the sound's texture and mood
           (e.g., ["bonk", "cartoon", "fast"]). Choose from the trait catalog or describe creatively.

        3. **beat_delay:** Controls the pause inserted after the SFX plays.
           - 'none': No pause, dialogue continues immediately.
           - 'short': 0.3s pause — good for comedic beats after a punchline.
           - 'long': 0.7s pause — good for dramatic reveals or tension buildup.

        4. **Anticipatory Hits (J-Cuts):** Use placement: "end" with offset_seconds: -0.2 to start
           the sound just before the line finishes. Great for shockers or sudden realizations.

        5. **Atmospheric Bedding:** Use placement: "start" to trigger sounds right as a speaker begins.

        6. **Volume Control:** Use volume_modifier (in dB) to make background sounds subtle (-5.0)
           or punchy stings stand out (+2.0).
      script_schema: |
        {
          "type": "array",
          "description": "List of turns in the dialogue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": {
                "type": "string",
                "description": "Nina or Tina"
              },
              "line": {
                "type": "string",
                "description": "The concise line text."
              },
              "topic": {
                "type": "string",
                "description": "The discussed subtopic."
              },
              "highlight": {
                "type": "object",
                "properties": {
                  "category": {
                    "type": "string",
                    "description": "SFX category: 'comedy', 'horror', or 'neutral'"
                  },
                  "desired_traits": {
                    "type": "array",
                    "description": "2 to 5 descriptive trait strings (e.g., bonk, cartoon, fast)",
                    "items": { "type": "string" }
                  },
                  "description": {
                    "type": "string",
                    "description": "Natural language prompt for ElevenLabs generation (e.g., 'a quick cartoon bonk with a spring reverb tail')"
                  },
                  "placement": {
                    "type": "string",
                    "description": "Trigger at 'start' or 'end' of dialogue segment."
                  },
                  "beat_delay": {
                    "type": "string",
                    "description": "Pause after SFX: 'none' (no pause), 'short' (0.3s), 'long' (0.7s)"
                  },
                  "offset_seconds": {
                    "type": "number",
                    "description": "Fine-tune trigger. Negative = overlap, Positive = delay. Range: -0.5 to 0.5."
                  },
                  "volume_modifier": {
                    "type": "number",
                    "description": "dB adjustment. Negative for subtle, positive for loud. Range: -10 to 5."
                  }
                },
                "required": ["category", "desired_traits", "placement"]
              }
            },
            "required": ["speaker", "line", "topic"]
          }
        }
    voice_settings:
      stability: 0.75
      similarity_boost: 0.9
      speed: 1.0
      style: 0.0
      use_speaker_boost: true
  horror:
    name: horror
    video:
      paths:
      - resources/video/HorrorVid_Drs.mp4
    music:
      path: resources/audio/stale.mp3
      volume: 0.35
    prompting:
      system_instruction: |
        You are a master of psychological horror and suspense. Your goal is to adapt the user's story
        into a high-retention script.

        STRATEGY:
        1. Use short, punchy sentences to build anxiety.
        2. Identify "Beats of Terror": moments where a sound effect (SFX) will maximize the impact.


        **PROFESSIONAL SFX EDITOR MODE:**

        Act as a professional audio editor. Use the 'highlight' object to time SFX for maximum impact:

        1. **category:** Must be one of the available SFX categories (e.g., 'comedy', 'horror', 'neutral').

        2. **desired_traits:** A list of 2 to 5 descriptive strings for the sound's texture and mood
           (e.g., ["sharp", "metallic", "sudden"]). Choose from the trait catalog or describe creatively.

        3. **beat_delay:** Controls the pause inserted after the SFX plays.
           - 'none': No pause, narration continues immediately.
           - 'short': 0.3s pause — good for a quick tension beat.
           - 'long': 0.7s pause — ideal after a jump scare or revelation to let it land.

        4. **Anticipatory Hits (J-Cuts):** Use placement: "end" with offset_seconds: -0.2 to start
           a shocker just before a revelation line ends.

        5. **Atmospheric Drones:** Use placement: "start" to trigger a whisper or low hit right as
           a creepy segment begins.

        6. **Volume Control:** Use volume_modifier (in dB) to make whispers subtle (-8.0) or
           jump scares loud (+3.0).

        HIGHLIGHT RULES:
        - Use category: 'horror', desired_traits: ['sharp', 'sudden'] only at the climax of a revelation.
        - Use category: 'horror', desired_traits: ['eerie', 'atmospheric'] when something unsettling is discovered.
        - Use category: 'neutral', desired_traits: ['subtle', 'clean'] for dramatic plot twists.
        - CRITICAL: Never use more than 3 highlights in a 60-second script to avoid cluttering.
      script_schema: |
        {
          "type": "array",
          "description": "List of lines in the first-person monologue.",
          "items": {
            "type": "object",
            "properties": {
              "speaker": { "type": "string" },
              "line": { "type": "string" },
              "mood": { "type": "string" },
              "highlight": {
                "type": "object",
                "properties": {
                  "category": {
                    "type": "string",
                    "description": "SFX category: 'comedy', 'horror', or 'neutral'"
                  },
                  "desired_traits": {
                    "type": "array",
                    "description": "2 to 5 descriptive trait strings (e.g., sharp, metallic, echo)",
                    "items": { "type": "string" }
                  },
                  "description": {
                    "type": "string",
                    "description": "Natural language prompt for ElevenLabs generation (e.g., 'a sharp sudden metallic sting with an eerie echo')"
                  },
                  "placement": {
                    "type": "string",
                    "description": "Trigger at 'start' or 'end' of dialogue segment."
                  },
                  "beat_delay": {
                    "type": "string",
                    "description": "Pause after SFX: 'none' (no pause), 'short' (0.3s), 'long' (0.7s)"
                  },
                  "offset_seconds": {
                    "type": "number",
                    "description": "Shift in seconds. Negative = Overlap, Positive = Delay. Range: -0.5 to 0.5."
                  },
                  "volume_modifier": {
                    "type": "number",
                    "description": "dB adjustment. Negative for subtle, positive for loud."
                  }
                },
                "required": ["category", "desired_traits", "placement"]
              }
            },
            "required": ["speaker", "line", "mood"]
          }
        }
    voice_settings:
      stability: 0.9
      similarity_boost: 0.85
      speed: 0.95
      use_speaker_boost: false
