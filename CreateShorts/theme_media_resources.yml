        **PROFESSIONAL SFX EDITOR MODE:**

        Use the 'highlight' object to time SFX for maximum impact:

        1. **category:** Must be one of the available SFX categories (e.g., 'comedy', 'horror', 'neutral').

        2. **desired_traits:** A list of 2 to 5 descriptive strings for the sound's texture and mood
           (e.g., ["punchy", "light", "quick"]). Choose from the trait catalog or describe creatively.

        3. **beat_delay:** Controls the pause inserted after the SFX plays.
           - 'none': No pause, narration continues immediately.
           - 'short': 0.3s pause — good for comedic or emotional beats.
           - 'long': 0.7s pause — ideal after a key revelation or dramatic twist.

        4. **Anticipatory Hits:** Use placement: "end" with offset_seconds: -0.2 for sudden realizations.

        5. **Atmospheric Bedding:** Use placement: "start" to trigger background elements right as
           a speaker begins.

        6. **Volume Control:** Use volume_modifier (in dB) to balance effects.
      script_schema: |
        {
          "type": "array",
          "description": "List of lines in the first-person monologue.",
